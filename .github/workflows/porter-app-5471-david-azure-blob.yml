"on":
    push:
        branches:
            - main
name: Deploy to david-azure-blob
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: david-azure-blob
                PORTER_CLUSTER: "5471"
                PORTER_DEPLOYMENT_TARGET_ID: ea0f3585-4f47-4514-8dd7-2cd8580e09e3
                PORTER_HOST: https://dashboard.porter.run
                PORTER_PROJECT: "9267"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_9267_15804 }}
