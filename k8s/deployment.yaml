apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-blob-notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-blob-notes
  template:
    metadata:
      labels:
        app: azure-blob-notes
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: azure-blob-notes
      containers:
        - name: app
          image: YOUR_ACR.azurecr.io/azure-blob-notes:latest
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_STORAGE_ACCOUNT
              value: YOUR_STORAGE_ACCOUNT
---
apiVersion: v1
kind: Service
metadata:
  name: azure-blob-notes
spec:
  selector:
    app: azure-blob-notes
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: azure-blob-notes
  annotations:
    azure.workload.identity/client-id: YOUR_MANAGED_IDENTITY_CLIENT_ID
